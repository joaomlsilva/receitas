<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css?v=3" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background-color:#ea580c">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#" onclick="showHome()">
            <i class="bi bi-journal-richtext me-2"></i>Receitas
        </a>
        <button class="btn btn-outline-light btn-sm" onclick="showCreateForm()">
            <i class="bi bi-plus-lg me-1"></i>Nova Receita
        </button>
    </div>
</nav>

<div class="container-fluid g-0">
    <div class="row g-0">

        <!-- Sidebar -->
        <aside class="col-md-3 col-lg-2 sidebar">
            <div class="sidebar-section pb-1">
                <h6 class="sidebar-label">As Minhas Receitas</h6>
                <!-- Type filter -->
                <div class="mb-2">
                    <select id="tipo-filter" class="form-select form-select-sm" onchange="applyFilter()">
                        <option value="">Todos os tipos</option>
                        <option value="doces">Doces</option>
                        <option value="carne">Carne</option>
                        <option value="peixe">Peixe</option>
                        <option value="marisco">Marisco</option>
                        <option value="massas">Massas</option>
                        <option value="pizzas">Pizzas</option>
                        <option value="sopas">Sopas</option>
                        <option value="saladas">Saladas</option>
                        <option value="petiscos">Petiscos</option>
                        <option value="molhos">Molhos</option>
                        <option value="temperos">Temperos</option>
                        <option value="bebidas">Bebidas</option>
                    </select>
                </div>
                <div id="recipe-list">
                    <div class="text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                    </div>
                </div>
            </div>

            <!-- MealDB Search (Bonus) -->
            <div class="sidebar-section sidebar-search">
                <h6 class="sidebar-label">Pesquisar (MealDB)</h6>
                <div class="input-group input-group-sm">
                    <input type="text" id="search-input" class="form-control"
                           placeholder="Ex: chicken..." maxlength="100">
                    <button class="btn btn-outline-primary" onclick="performSearch()">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
                <div id="search-error" class="text-danger small mt-1" hidden></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="col-md-9 col-lg-10 main-content">

            <!-- Welcome View -->
            <div id="welcome-view" class="welcome-view">
                <i class="bi bi-journal-richtext display-1 text-muted"></i>
                <h3 class="mt-3 text-muted">Bem-vindo às suas Receitas</h3>
                <p class="text-muted">Selecione uma receita na lista ou crie uma nova.</p>
                <button class="btn btn-primary mt-2" onclick="showCreateForm()">
                    <i class="bi bi-plus-lg me-1"></i>Criar Receita
                </button>
            </div>

            <!-- Recipe Card View -->
            <div id="recipe-view" class="recipe-card-container" hidden></div>

            <!-- Create Form -->
            <div id="create-form" hidden>
                <div class="form-container">
                    <h3 class="mb-4"><i class="bi bi-plus-circle me-2 text-primary"></i>Nova Receita</h3>
                    <form id="receita-form" onsubmit="submitForm(event)" novalidate>
                        <div class="row g-3">

                            <div class="col-md-8">
                                <label class="form-label">Título *</label>
                                <input type="text" class="form-control" id="f-titulo"
                                       placeholder="Ex: Bacalhau à Brás" required maxlength="200">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Origem *</label>
                                <input type="text" class="form-control" id="f-origem"
                                       placeholder="Ex: Nome de quem criou" required maxlength="200">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Tipo *</label>
                                <select class="form-select" id="f-tipo" required onchange="toggleSubtipo()">
                                    <option value="">Selecionar...</option>
                                    <option value="doces">Doces</option>
                                    <option value="carne">Carne</option>
                                    <option value="peixe">Peixe</option>
                                    <option value="marisco">Marisco</option>
                                    <option value="massas">Massas</option>
                                    <option value="pizzas">Pizzas</option>
                                    <option value="sopas">Sopas</option>
                                    <option value="saladas">Saladas</option>
                                    <option value="petiscos">Petiscos</option>
                                    <option value="molhos">Molhos</option>
                                    <option value="temperos">Temperos</option>
                                    <option value="bebidas">Bebidas</option>
                                </select>
                            </div>
                            <div class="col-md-4" id="subtipo-group" hidden>
                                <label class="form-label">Subtipo de Bebida *</label>
                                <select class="form-select" id="f-subtipo">
                                    <option value="">Selecionar...</option>
                                    <option value="com alcool">Com Álcool</option>
                                    <option value="sem alcool">Sem Álcool</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Pessoas *</label>
                                <input type="number" class="form-control" id="f-pessoas"
                                       min="1" max="100" value="4" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Dificuldade *</label>
                                <select class="form-select" id="f-dificuldade" required>
                                    <option value="">Selecionar...</option>
                                    <option value="principiante">Principiante</option>
                                    <option value="intermedio">Intermédio</option>
                                    <option value="avançado">Avançado</option>
                                </select>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label">URL da Foto <span class="text-muted">(opcional)</span></label>
                                <input type="url" class="form-control" id="f-foto"
                                       placeholder="https://...">
                            </div>

                            <!-- Ingredients -->
                            <div class="col-12">
                                <label class="form-label">Ingredientes *</label>
                                <div id="ingredientes-list"></div>
                                <button type="button" class="btn btn-outline-secondary btn-sm mt-2"
                                        onclick="addIngrediente()">
                                    <i class="bi bi-plus me-1"></i>Adicionar Ingrediente
                                </button>
                            </div>

                            <!-- Preparation Steps -->
                            <div class="col-12">
                                <label class="form-label">Passos de Preparação *</label>
                                <div id="passos-list"></div>
                                <button type="button" class="btn btn-outline-secondary btn-sm mt-2"
                                        onclick="addPasso()">
                                    <i class="bi bi-plus me-1"></i>Adicionar Passo
                                </button>
                            </div>

                            <div class="col-12">
                                <div id="form-error" class="alert alert-danger" hidden></div>
                                <div class="d-flex gap-2 flex-wrap">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-lg me-1"></i>Criar Receita
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="showHome()">
                                        Cancelar
                                    </button>
                                </div>
                            </div>

                        </div>
                    </form>
                </div>
            </div>

            <!-- Search Results -->
            <div id="search-results" hidden>
                <div class="form-container">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <h3 class="mb-0"><i class="bi bi-search me-2 text-primary"></i>Resultados da Pesquisa</h3>
                        <button class="btn btn-outline-secondary btn-sm" onclick="showHome()">
                            <i class="bi bi-arrow-left me-1"></i>Voltar
                        </button>
                    </div>
                    <div id="search-results-content"></div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="app-toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-medium" id="toast-body"></div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
